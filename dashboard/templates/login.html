<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - App de Assinaturas</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #050505; 
            color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .header-section {
            text-align: left;
            margin-bottom: 8px;
        }

        .header-section h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header-section p {
            color: #A0A0A0;
            font-size: 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .label-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-left: 4px;
            margin-right: 4px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: #E0E0E0;
        }

        .forgot-password {
            font-size: 13px;
            color: #A855F7;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: #8B5CF6;
            text-decoration: underline;
        }

        .form-group input {
            background-color: #1A1A1A; 
            border: 1px solid transparent;
            border-radius: 16px; 
            padding: 16px;
            color: #FFFFFF;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-group input::placeholder {
            color: #666666;
        }

        .form-group input:focus {
            border-color: #9B51E0; 
            background-color: #222222;
        }

        .action-button {
            background: linear-gradient(135deg, #A855F7, #8B5CF6);
            color: #FFFFFF;
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: opacity 0.2s;
        }

        .action-button:hover {
            opacity: 0.9;
        }

        .toggle-auth {
            text-align: center;
            font-size: 14px;
            color: #A0A0A0;
            margin-top: 16px;
        }

        .toggle-auth a {
            color: #A855F7; 
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .toggle-auth a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="header-section">
            <h1>Bem-vindo de volta</h1>
            <p>Acesse sua conta para continuar.</p>
        </div>

        <form method="POST" action='{% url "login" %}'>
            {% csrf_token %}
            <div class="form-group">
                <div class="label-container">
                    <label for="nome">Nome de Usuário</label>
                </div>
                <input name="nome" type="text" id="email" placeholder="seu username">
            </div>

            <div class="form-group">
                <div class="label-container">
                    <label for="senha">Senha</label>
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                </div>
                <input name="senha" type="password" id="senha" placeholder="••••••••">
            </div>

            <button type="submit" class="action-button">Entrar</button>
        </form>

        <div class="toggle-auth">
            Ainda não tem uma conta? <a href="{% url 'cadastro' %}">Cadastre-se</a>
        </div>
    </div>

</body>
</html>
